<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>なかりんの自己紹介</title>
    <meta name="description" content="ICT授業アドバイザー「なかりん」の自己紹介ページです。">
    <!-- やさしい雰囲気のフォント（Zen Maru Gothic）をGoogle Fontsから読み込む -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- デザインを定義したCSSファイルを読み込む -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- プロフィール全体を囲むカード -->
        <div class="profile-card">
            <!-- 上部：写真と名前のエリア -->
            <div class="profile-header">
                <!-- プロフィール写真の枠（画像は後で差し替え可能） -->
                <div class="profile-image-frame">
                    <img src="kokochieigaccha.jpg" alt="なかりんのプロフィール写真" class="profile-image">
                </div>
                <div class="profile-title">
                    <p class="job">ICT授業アドバイザー</p>
                    <h1>なかりん</h1>
                </div>
            </div>
            
            <!-- 下部：自己紹介と趣味のエリア -->
            <div class="profile-content">
                <!-- 自己紹介セクション -->
                <div class="section about">
                    <h2>自己紹介</h2>
                    <p>こんにちは！なかりんと申します。「ICT授業アドバイザー」として、学校や教育現場でのテクノロジー活用をサポートしています。先生方や子どもたちがもっと楽しく、効果的に学べる環境づくりをお手伝いするのが私のやりがいです。</p>
                    <p>休日は読書に没頭したり、おしゃれなカフェを巡ってリフレッシュしたり、映画鑑賞で新しい世界に触れるのが好きです。どうぞよろしくお願いします！</p>
                </div>

                <!-- 趣味セクション -->
                <div class="section hobbies">
                    <h2>趣味</h2>
                    <ul class="hobby-list">
                        <li>
                            <span class="hobby-icon">📚</span>
                            読書
                        </li>
                        <li>
                            <span class="hobby-icon">☕</span>
                            カフェ巡り
                        </li>
                        <li>
                            <span class="hobby-icon">🎬</span>
                            映画鑑賞
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
